<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Environ Adapt Operations Dashboard | Smart PET Recycling Intelligence</title>

  <meta name="description" content="Professional PET flakes washing dashboard for recycling operations, production yield, PH, boilers, waste tracking and sustainability performance." />

  <!-- Open Graph / WhatsApp / Facebook Preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Environ Adapt Operations Dashboard" />
  <meta property="og:description" content="Smart PET recycling dashboard turning waste into measurable value through production, quality, PH, boilers and waste monitoring." />
  <meta property="og:url" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/" />
  <meta property="og:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/social-preview.jpg" />
  <meta property="og:image:secure_url" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/social-preview.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Environ Adapt" />

  <!-- Twitter / X Preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Environ Adapt Operations Dashboard" />
  <meta name="twitter:description" content="Smart PET recycling dashboard turning waste into measurable value." />
  <meta name="twitter:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/social-preview.jpg" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle sidebar">‹</button>

      <div class="brand-block">
        <img id="brandLogo" class="brand-logo" src="assets/logo-environ-adapt-light.png" alt="Environ Adapt" />
      </div>

      <nav class="nav-list" aria-label="Dashboard sections">
        <button class="nav-item active" data-page="summary">
          <span class="nav-icon">◈</span>
          <b data-i18n="summary">Executive Summary</b>
        </button>

        <div class="nav-group-label">Operations</div>

        <button class="nav-item" data-page="production">
          <span class="nav-icon">⚙</span>
          <b data-i18n="production">Production &amp; Yield</b>
        </button>

        <button class="nav-item" data-page="receiving">
          <span class="nav-icon">▣</span>
          <b data-i18n="receiving">Receiving</b>
        </button>

        <button class="nav-item" data-page="sales">
          <span class="nav-icon">↗</span>
          <b data-i18n="sales">Sales &amp; Revenue</b>
        </button>

        <div class="nav-group-label">Quality &amp; Process</div>

        <button class="nav-item" data-page="quality">
          <span class="nav-icon">✦</span>
          <b data-i18n="quality">Quality Control</b>
        </button>

        <button class="nav-item" data-page="boilerph">
          <span class="nav-icon">℃</span>
          <b data-i18n="boilerph">Boiler &amp; PH</b>
        </button>

        <div class="nav-group-label">Reports</div>

        <button class="nav-item" data-page="reports">
          <span class="nav-icon">▤</span>
          <b data-i18n="reports">Raw Data</b>
        </button>
      </nav>

      <div class="mission-card">
        <div class="mission-art"></div>
        <div class="mission-body">
          <img class="dawar-logo" src="assets/dawar-icon-green.png" alt="Dawar" />
          <h3>DAWAR</h3>
          <p>Turning waste into measurable value through smarter PET recycling operations.</p>
        </div>
      </div>

      <div class="sidebar-status">
        <span class="dot"></span>
        <span id="sideStatus">Synced</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
  <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open menu">☰</button>

  <div class="title-area">
    
          <h1 id="pageTitle">Executive Summary</h1>
          <p id="pageSubTitle">PET Flakes Washing Intelligence</p>
          <span class="live-pill">
            <span class="dot"></span>
            <span id="liveText">Live from Google Sheets</span>
          </span>
        </div>

        <div class="toolbar">
          <label>
            DATE FROM
            <input id="dateFrom" type="date" />
          </label>

          <label>
            DATE TO
            <input id="dateTo" type="date" />
          </label>

          <label>
            SHIFT
            <select id="shiftFilter">
              <option value="all">All Shifts</option>
              <option value="Day">Day</option>
              <option value="Night">Night</option>
            </select>
          </label>

          <button id="refreshBtn" class="btn ghost">⟳ Refresh</button>
          <button id="newEntryBtn" class="btn primary">+ New Entry</button>
          <button id="exportBtn" class="btn ghost">↓ Export</button>
          <button id="themeBtn" class="btn icon" aria-label="Toggle theme">☾</button>
          <button id="langBtn" class="btn ghost">AR</button>

          <span id="connectionState" class="state-pill">
            <span class="dot"></span>
            Ready
          </span>
        </div>
      </header>

      <section id="activeFilterBar" class="filter-bar hidden">
        <span id="activeFilterText"></span>
        <button id="clearChartFilter" class="btn small">✕ Clear</button>
      </section>

      <section id="page-summary" class="page active"></section>
      <section id="page-production" class="page"></section>
      <section id="page-receiving" class="page"></section>
      <section id="page-sales" class="page"></section>
      <section id="page-quality" class="page"></section>
      <section id="page-boilerph" class="page"></section>
      <section id="page-reports" class="page"></section>
    </main>
  </div>

  <div id="entryModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button id="modalClose" class="modal-close" aria-label="Close modal">×</button>

      <div class="modal-head">
        <h2>New Entry</h2>
        <p>Choose entry type and save directly to Google Sheets.</p>
      </div>

      <div id="entryTypeTabs" class="entry-tabs"></div>
      <form id="entryForm" class="entry-form"></form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
