<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Environ Adapt Operations Dashboard</title>
  <meta name="description" content="PET flakes washing operations dashboard for receiving, production, yield, waste, downtime, PH and boiler monitoring." />
  <meta property="og:title" content="Environ Adapt Operations Dashboard" />
  <meta property="og:description" content="Live PET flakes washing operations dashboard connected to Google Sheets." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/" />
  <meta property="og:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/preview.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/preview.jpg" />
  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/favicon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle sidebar">‹</button>
      <div class="brand-block">
        <picture>
          <source srcset="assets/logo-environ-adapt-white.png" media="(prefers-color-scheme: dark)">
          <img id="brandLogo" class="brand-logo" src="assets/logo-environ-adapt-light.png" alt="Environ Adapt" />
        </picture>
        <div class="brand-copy">
          <h2>Flakes</h2>
          <p>PET Washing Line Dashboard</p>
        </div>
      </div>
      <nav class="nav-list" aria-label="Dashboard sections">
        <button class="nav-item active" data-page="overview"><span>⌂</span><b data-i18n="overview">Overview</b></button>
        <button class="nav-item" data-page="receiving"><span>▣</span><b data-i18n="receiving">Receiving & Production</b></button>
        <button class="nav-item" data-page="process"><span>◌</span><b data-i18n="process">Process, PH & Boilers</b></button>
        <button class="nav-item" data-page="waste"><span>♻</span><b data-i18n="waste">Waste & Downtime</b></button>
        <button class="nav-item" data-page="sales"><span>↗</span><b data-i18n="sales">Sales & Export</b></button>
        <button class="nav-item" data-page="reports"><span>▤</span><b data-i18n="reports">Reports</b></button>
      </nav>
      <div class="mission-card">
        <div class="mission-art"></div>
        <img class="dawar-logo" src="assets/dawar-icon-green.png" alt="Dawar" />
        <h3>DAWAR</h3>
        <p>Turning waste into measurable value</p>
      </div>
      <div class="sidebar-status"><span class="dot"></span><span id="sideStatus">Synced with Google Sheets</span></div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="title-area">
          <h1 id="pageTitle">Environ Adapt Operations Dashboard</h1>
          <p id="pageSubTitle">PET Flakes Washing Intelligence</p>
          <span class="live-pill"><span class="dot"></span> <span id="liveText">Live from Google Sheets</span></span>
        </div>
        <div class="toolbar">
          <label>Date From<input id="dateFrom" type="date" /></label>
          <label>Date To<input id="dateTo" type="date" /></label>
          <label>Shift<select id="shiftFilter"><option value="all">All Shifts</option><option value="Day">Day</option><option value="Night">Night</option></select></label>
          <button id="refreshBtn" class="btn ghost">⟳ Refresh</button>
          <button id="newEntryBtn" class="btn primary">+ New Entry</button>
          <button id="exportBtn" class="btn ghost">▣ Export Excel</button>
          <button id="themeBtn" class="btn icon">☾</button>
          <button id="langBtn" class="btn ghost">AR | EN</button>
          <span id="connectionState" class="state-pill"><span class="dot"></span> Ready</span>
        </div>
      </header>

      <section id="activeFilterBar" class="filter-bar hidden">
        <span id="activeFilterText"></span>
        <button id="clearChartFilter" class="btn small">Clear Filter</button>
      </section>

      <section id="page-overview" class="page active"></section>
      <section id="page-receiving" class="page"></section>
      <section id="page-process" class="page"></section>
      <section id="page-waste" class="page"></section>
      <section id="page-sales" class="page"></section>
      <section id="page-reports" class="page"></section>
    </main>
  </div>

  <div id="entryModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button id="modalClose" class="modal-close">×</button>
      <div class="modal-head">
        <h2>New Entry</h2>
        <p>Choose entry type and save directly to Google Sheets.</p>
      </div>
      <div id="entryTypeTabs" class="entry-tabs"></div>
      <form id="entryForm" class="entry-form"></form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
