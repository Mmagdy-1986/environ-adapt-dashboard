<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flakes Dashboard | Environ Adapt</title>
  <meta name="description" content="Professional PET flakes washing line dashboard for Environ Adapt: shifts, receiving, production, yield, boilers, PH, waste, downtime, and sales synced with Google Sheets." />
  <meta name="theme-color" content="#00c853" />
  <meta property="og:title" content="Flakes Dashboard | Environ Adapt" />
  <meta property="og:description" content="Interactive PET Flex washing dashboard connected to Google Sheets with production, yield, waste, downtime, PH, boiler readings, receiving and sales analytics." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/hero-environ.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Flakes Dashboard | Environ Adapt" />
  <meta name="twitter:description" content="Interactive PET Flex washing dashboard connected to Google Sheets." />
  <meta name="twitter:image" content="assets/hero-environ.jpg" />
  <link rel="icon" type="image/png" href="assets/dawar-icon.jpg" />
  <link rel="apple-touch-icon" href="assets/dawar-icon.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-box">
        <img src="assets/logo-environ-adapt.png" alt="Environ Adapt" class="brand-logo" />
        <div class="brand-text">
          <strong>Flakes</strong>
          <span data-i18n="sidebarSubtitle">PET Washing Dashboard</span>
        </div>
      </div>
      <button class="side-toggle" id="toggleSidebar" title="Toggle sidebar">☰</button>
      <nav class="nav-list">
        <button class="nav-item active" data-page="overview"><span>📊</span><b data-i18n="overview">الملخص العام</b></button>
        <button class="nav-item" data-page="supply"><span>🚚</span><b data-i18n="supply">التوريد والإنتاج</b></button>
        <button class="nav-item" data-page="process"><span>🌡️</span><b data-i18n="process">التشغيل و PH والغلايات</b></button>
        <button class="nav-item" data-page="waste"><span>♻️</span><b data-i18n="waste">الهالك والتوقفات</b></button>
      </nav>
      <div class="sidebar-footer">
        <img src="assets/dawar-logo.jpg" alt="Dawar by Environ Adapt" />
        <small data-i18n="sidebarFooter">Synced with Google Sheets</small>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle" data-i18n="overview">الملخص العام</h1>
          <p data-i18n="pageDescription">Dashboard for PET flakes washing line operations</p>
        </div>
        <div class="top-actions">
          <button class="ghost-btn" id="languageBtn">AR | EN</button>
          <button class="ghost-btn" id="themeBtn">🌙</button>
          <button class="primary-btn" id="openEntryBtn">+ <span data-i18n="entry">إدخال</span></button>
          <button class="ghost-btn" id="exportBtn" data-i18n="exportExcel">تصدير Excel</button>
        </div>
      </header>

      <section class="filters-card">
        <div class="filter-group">
          <label data-i18n="fromDate">من تاريخ</label>
          <input type="date" id="dateFrom" />
        </div>
        <div class="filter-group">
          <label data-i18n="toDate">إلى تاريخ</label>
          <input type="date" id="dateTo" />
        </div>
        <div class="filter-group">
          <label data-i18n="shift">الوردية</label>
          <select id="shiftFilter">
            <option value="all" data-i18n="all">الكل</option>
            <option value="Day" data-i18n="day">نهار</option>
            <option value="Night" data-i18n="night">ليل</option>
          </select>
        </div>
        <button class="ghost-btn" id="refreshBtn" data-i18n="refresh">تحديث</button>
        <div class="sync-status" id="syncStatus"><span class="dot"></span><span data-i18n="ready">جاهز</span></div>
      </section>

      <section id="overview" class="page active-page"></section>
      <section id="supply" class="page"></section>
      <section id="process" class="page"></section>
      <section id="waste" class="page"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="entryModal">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 data-i18n="newEntry">إدخال بيانات جديدة</h2>
          <p data-i18n="entryHelp">اختر نوع الإدخال وسيتم رفع البيانات إلى Google Sheets.</p>
        </div>
        <button class="close-btn" id="closeEntry">×</button>
      </div>
      <div class="entry-tabs" id="entryTabs"></div>
      <form id="entryForm" class="entry-form"></form>
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelEntry" type="button" data-i18n="cancel">إلغاء</button>
        <button class="primary-btn" id="saveEntry" type="button"><span data-i18n="save">حفظ</span></button>
      </div>
      <div id="formResult" class="form-result"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
