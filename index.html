<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Environ Adapt Operations Dashboard</title>
  <meta name="description" content="Professional PET flakes washing operations dashboard for receiving, production, yield, waste, downtime, PH and boiler monitoring, fully synced with Google Sheets." />
  <meta name="theme-color" content="#00c853" />
  <link rel="canonical" href="https://mmagdy-1986.github.io/environ-adapt-dashboard/" />

  <meta property="og:title" content="Environ Adapt Operations Dashboard" />
  <meta property="og:description" content="Professional PET flakes washing operations dashboard for receiving, production, yield, waste, downtime, PH and boiler monitoring, fully synced with Google Sheets." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/" />
  <meta property="og:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/preview.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Environ Adapt Operations Dashboard" />
  <meta name="twitter:description" content="Professional PET flakes washing operations dashboard for receiving, production, yield, waste, downtime, PH and boiler monitoring, fully synced with Google Sheets." />
  <meta name="twitter:image" content="https://mmagdy-1986.github.io/environ-adapt-dashboard/assets/preview.jpg" />

  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/favicon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-box">
        <img src="assets/logo-environ-adapt-light.png" data-light-logo="assets/logo-environ-adapt-light.png" data-dark-logo="assets/logo-environ-adapt-white.png" alt="Environ Adapt" class="brand-logo" />
        <div class="brand-text">
          <strong>Flakes</strong>
          <span data-i18n="sidebarSubtitle">PET Washing Dashboard</span>
        </div>
      </div>
      <button class="side-toggle" id="toggleSidebar" title="Toggle sidebar">☰</button>
      <nav class="nav-list">
        <button class="nav-item active" data-page="overview"><span>📊</span><b data-i18n="overview">Overview</b></button>
        <button class="nav-item" data-page="supply"><span>🚚</span><b data-i18n="supply">Receiving & Production</b></button>
        <button class="nav-item" data-page="process"><span>🌡️</span><b data-i18n="process">Process, PH & Boilers</b></button>
        <button class="nav-item" data-page="waste"><span>♻️</span><b data-i18n="waste">Waste & Downtime</b></button>
      </nav>
      <div class="sidebar-footer">
        <img src="assets/dawar-logo.jpg" alt="Dawar by Environ Adapt" />
        <small data-i18n="sidebarFooter">Synced with Google Sheets</small>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle" data-i18n="overview">Overview</h1>
          <p data-i18n="pageDescription">Dashboard for PET flakes washing line operations</p>
        </div>
        <div class="top-actions">
          <button class="ghost-btn" id="languageBtn">AR | EN</button>
          <button class="ghost-btn" id="themeBtn">🌙</button>
          <button class="primary-btn" id="openEntryBtn">+ <span data-i18n="entry">Entry</span></button>
          <button class="ghost-btn" id="exportBtn" data-i18n="exportExcel">Export Excel</button>
        </div>
      </header>

      <section class="filters-card">
        <div class="filter-group">
          <label data-i18n="fromDate">From Date</label>
          <input type="date" id="dateFrom" />
        </div>
        <div class="filter-group">
          <label data-i18n="toDate">To Date</label>
          <input type="date" id="dateTo" />
        </div>
        <div class="filter-group">
          <label data-i18n="shift">Shift</label>
          <select id="shiftFilter">
            <option value="all" data-i18n="all">All</option>
            <option value="Day" data-i18n="day">Day</option>
            <option value="Night" data-i18n="night">Night</option>
          </select>
        </div>
        <button class="ghost-btn" id="refreshBtn" data-i18n="refresh">Refresh</button>
        <div class="sync-status" id="syncStatus"><span class="dot"></span><span data-i18n="ready">Ready</span></div>
      </section>

      <section id="overview" class="page active-page"></section>
      <section id="supply" class="page"></section>
      <section id="process" class="page"></section>
      <section id="waste" class="page"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="entryModal">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 data-i18n="newEntry">New Data Entry</h2>
          <p data-i18n="entryHelp">Choose the entry type. Data will be uploaded to Google Sheets.</p>
        </div>
        <button class="close-btn" id="closeEntry">×</button>
      </div>
      <div class="entry-tabs" id="entryTabs"></div>
      <form id="entryForm" class="entry-form"></form>
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelEntry" type="button" data-i18n="cancel">Cancel</button>
        <button class="primary-btn" id="saveEntry" type="button"><span data-i18n="save">Save</span></button>
      </div>
      <div id="formResult" class="form-result"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
